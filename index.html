<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avukat Yusuf Bilgi - Alanya</title>
    <meta name="description" content="Avukat Yusuf Bilgi Hukuk Bürosu Alanya. Tel: 0553 677 98 15. Şekerhane Mah. Atatürk Cad. No.20 Kat 4/401 Alanya.">
    <!-- Google Fonts: Cormorant Garamond for elegant serif typography mirroring the print card -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
</head>
<body>
    <style>
        /* Reset and Base Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background-color: #eae7e1; /* Subtle warm gray background representing a table surface */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Times New Roman', Times, serif;
    padding: 1.5rem;
}
/* Elegant business card design */
.card {
    background-color: #faf8f5; /* Warm off-white card stock */
    /* Subtle linen-like paper texture using micro-gradients */
    background-image: 
        linear-gradient(90deg, rgba(160, 150, 135, 0.06) 1px, transparent 1px),
        linear-gradient(rgba(160, 150, 135, 0.06) 1px, transparent 1px);
    background-size: 2px 2px;
    
    width: 100%;
    max-width: 800px;
    aspect-ratio: 1.618; /* Golden ratio of a traditional business card */
    padding: 4.5rem 4rem 4rem 4rem;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.06),
                0 2px 5px rgba(0, 0, 0, 0.02);
    border: 1px solid rgba(0, 0, 0, 0.04);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
}
/* Header/Center details */
.header-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: auto;
    margin-bottom: auto;
    padding-bottom: 2rem;
}
.title-avukat {
    font-size: 1.8rem;
    font-weight: 500;
    letter-spacing: 7px;
    color: #3a3a3a;
    margin-bottom: 0.8rem;
    text-transform: uppercase;
    text-indent: 7px; /* Balance spacing */
}
.name-yusuf {
    font-size: 3.6rem;
    font-weight: 600;
    color: #151515;
    letter-spacing: 1px;
}
/* Footer details (Left / Right aligned) */
.footer-group {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    width: 100%;
}
.tel-block, .address-block {
    font-size: 1.2rem;
    font-weight: 600;
    color: #111111;
}
.tel-block a, .address-block a {
    color: inherit;
    text-decoration: none;
    transition: opacity 0.2s ease;
}
.tel-block a:hover, .address-block a:hover {
    opacity: 0.7;
    text-decoration: underline;
}
.address-block a {
    display: flex;
    flex-direction: column;
    text-align: left;
    line-height: 1.45;
}
/* Responsive adjustments for mobile screens */
@media (max-width: 700px) {
    body {
        padding: 1rem;
    }
    
    .card {
        aspect-ratio: auto;
        padding: 4rem 2rem;
        gap: 5rem;
    }
    
    .title-avukat {
        font-size: 1.4rem;
        letter-spacing: 5px;
        text-indent: 5px;
    }
    
    .name-yusuf {
        font-size: 2.8rem;
    }
    
    .footer-group {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 2rem;
    }
    
    .address-block a {
        text-align: center;
    }
    
    .tel-block, .address-block {
        font-size: 1.05rem;
    }
}
@media (max-width: 400px) {
    .card {
        padding: 3.5rem 1.25rem;
    }
    
    .name-yusuf {
        font-size: 2.3rem;
    }
}

    </style>
    <main class="card">
        <div class="header-group">
            <p class="title-avukat">AVUKAT</p>
            <h1 class="name-yusuf">Yusuf BİLGİ</h1>
        </div>
        
        <div class="footer-group">
            <div class="tel-block">
                <span>Tel: 0553 677 98 15</span>
            </div>
            
            <div class="address-block">
                <a href="https://maps.google.com/?q=Şekerhane+Mah.+Atatürk+Cad.+No.20+Kat+4/401+Alanya+Antalya" target="_blank" rel="noopener noreferrer" id="location-link">
                    <span>Şekerhane Mah. Atatürk Cad.</span>
                    <span>No.20 Kat 4/401 ALANYA / ANTALYA</span>
                </a>
            </div>
        </div>
    </main>
</body>
</html>
