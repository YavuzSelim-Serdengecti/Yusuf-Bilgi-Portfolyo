<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avukat Yusuf Bilgi - Alanya</title>
    <meta name="description" content="Avukat Yusuf Bilgi Hukuk Bürosu Alanya. Tel: 0553 677 98 15. Şekerhane Mah. Atatürk Cad. No.20 Kat 4/401 Alanya.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <style>
        /* Reset and Base Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background-color: #faf8f5;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: "Times New Roman", Times, serif;
}
/* Elegant card design filling the entire viewport, centering the content */
.card {
    background-color: #faf8f5; /* Warm off-white card stock */
    /* Subtle linen-like paper texture using micro-gradients */
    background-image: 
        linear-gradient(90deg, rgba(160, 150, 135, 0.06) 1px, transparent 1px),
        linear-gradient(rgba(160, 150, 135, 0.06) 1px, transparent 1px);
    background-size: 2px 2px;
    
    width: 100%;
    min-height: 100vh;
    padding: 4rem 2rem;
    display: flex;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
}
/* Centered content wrapper */
.content-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
    max-width: 900px;
}
.title-avukat {
    font-size: 1.8rem;
    font-weight: 500;
    letter-spacing: 8px;
    color: #3a3a3a;
    margin-bottom: 0.6rem;
    text-transform: uppercase;
    text-indent: 8px; /* Balance spacing */
}
.name-yusuf {
    font-size: 4.6rem; /* Enlarged name */
    font-weight: 600;
    color: #151515;
    letter-spacing: 1px;
    line-height: 1.15;
}
/* Contact info below the name in the center */
.contact-info {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8rem; /* Wider gap between phone and address */
    width: 100%;
    margin-top: 3.5rem; /* Generous top space since divider was removed */
}
.tel-block, .address-block {
    font-size: 1.25rem;
    font-weight: 600;
    color: #111111;
}
.tel-block a, .address-block a {
    color: inherit;
    text-decoration: none;
    transition: opacity 0.2s ease;
}
.tel-block a:hover, .address-block a:hover {
    opacity: 0.7;
    text-decoration: underline;
}
.address-block a {
    display: flex;
    flex-direction: column;
    text-align: left;
    line-height: 1.45;
}
/* Responsive adjustments for mobile screens */
@media (max-width: 768px) {
    .card {
        padding: 3rem 1.5rem;
    }
    
    .title-avukat {
        font-size: 1.4rem;
        letter-spacing: 5px;
        text-indent: 5px;
    }
    
    .name-yusuf {
        font-size: 3.2rem; /* Adjusted for tablet */
    }
    
    .contact-info {
        flex-direction: column;
        gap: 2rem;
    }
    
    .address-block a {
        text-align: center;
    }
}
@media (max-width: 480px) {
    .name-yusuf {
        font-size: 2.6rem; /* Adjusted for phone */
    }
    
    .divider {
        margin: 2rem auto;
        width: 100px;
    }
    
    .tel-block, .address-block {
        font-size: 1.15rem;
    }
}
    </style>
    <main class="card">
        <div class="content-wrapper">
            <p class="title-avukat">AVUKAT</p>
            <h1 class="name-yusuf">Yusuf BİLGİ</h1>
            
            <div class="contact-info">
                <div class="tel-block">
                    <span>Tel: 0553 677 98 15</span>
                </div>
                
                <div class="address-block">
                    <a href="https://www.google.com/maps/place/AV.+YUSUF+B%C4%B0LG%C4%B0/@36.5438461,31.997273,333m/data=!3m1!1e3!4m6!3m5!1s0x14dc99768291b4ed:0x2f407bc6cd981018!8m2!3d36.5438586!4d31.9996851!16s%2Fg%2F11yttfqd7x?entry=tts&g_ep=EgoyMDI2MDcwOC4wIPu8ASoASAFQAw%3D%3D&skid=0525fb58-02e3-461b-95e2-d93761360ddb" target="_blank" rel="noopener noreferrer" id="location-link">
                        <span>Şekerhane Mah. Atatürk Cad.</span>
                        <span>No.20 Kat 4/401 ALANYA / ANTALYA</span>
                    </a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
